<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shīkho — Learn Gujarati</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e07a3c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Shīkho" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">શી</span>
      <div>
        <h1>Shīkho</h1>
        <p class="tagline">Learn Gujarati — A1 to B2</p>
      </div>
    </div>
    <div class="topbar-stats">
      <span class="topbar-stat">🔥 <span id="streak-count">0</span></span>
      <span class="topbar-stat">⚡ <span id="xp-count">0</span></span>
      <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="home">Learn</button>
    <button class="tab" data-view="alphabet">Alphabet</button>
    <button class="tab" data-view="stories">Stories</button>
    <button class="tab" data-view="review">Review</button>
    <button class="tab" data-view="conversation">Conversation</button>
    <button class="tab" data-view="settings">Settings</button>
  </nav>

  <main id="main"></main>

  <footer class="footer">
    <p>Built for self-paced learning. All progress lives in your browser.</p>
  </footer>

  <!-- Data -->
  <script src="data/alphabet.js"></script>
  <script src="data/vocabulary.js"></script>
  <script src="data/grammar.js"></script>
  <script src="data/dialogues.js"></script>
  <script src="data/units.js"></script>
  <script src="data/stories.js"></script>

  <!-- Modules -->
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/shadowing.js"></script>
  <script src="js/dict.js"></script>
  <script src="js/lesson-player.js"></script>
  <script src="js/path.js"></script>
  <script src="js/alphabet.js"></script>
  <script src="js/stories.js"></script>
  <script src="js/review.js"></script>
  <script src="js/conversation.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
